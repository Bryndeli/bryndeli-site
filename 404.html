<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Not found — Bryndeli</title>
<meta name="theme-color" content="#F8EDE0">
<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Inter:wght@400;500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --pine: #2F5D4E;
    --pine-deep: #1F4034;
    --terracotta: #C9614A;
    --oat: #F8EDE0;
    --bark-soft: #4A423A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--oat);
    color: var(--pine-deep);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.45;
    mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2'/%3E%3CfeColorMatrix values='0 0 0 0 0.18 0 0 0 0 0.36 0 0 0 0 0.31 0 0 0 0.05 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  main {
    text-align: center;
    max-width: 540px;
    position: relative;
    z-index: 2;
  }
  .symbol {
    width: 80px;
    height: 80px;
    margin: 0 auto 40px;
    display: block;
  }
  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--pine);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 18px;
    opacity: 0.75;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -0.025em;
    margin-bottom: 18px;
  }
  h1 em { font-style: italic; font-weight: 500; color: var(--terracotta); }
  p {
    font-size: 17px;
    color: var(--bark-soft);
    margin-bottom: 36px;
    line-height: 1.6;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 26px;
    background: var(--pine);
    color: var(--oat);
    text-decoration: none;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    transition: transform 0.2s, background 0.2s;
  }
  .btn:hover { background: var(--pine-deep); transform: translateY(-1px); }
</style>
</head>
<body>
<main>
  <svg class="symbol" viewBox="0 0 200 200" aria-hidden="true">
    <circle cx="100" cy="100" r="76" fill="none" stroke="#2F5D4E" stroke-width="11" stroke-linecap="round" stroke-dasharray="310 138" transform="rotate(-32 100 100)"/>
    <circle cx="100" cy="100" r="48" fill="none" stroke="#2F5D4E" stroke-width="9" stroke-linecap="round" stroke-dasharray="206 88" transform="rotate(64 100 100)"/>
    <circle cx="100" cy="100" r="17" fill="#C9614A"/>
  </svg>
  <div class="label">Error 404</div>
  <h1>This page <em>isn't on the round.</em></h1>
  <p>The page you're looking for moved, was renamed, or never existed in the first place. Let's get you back to somewhere useful.</p>
  <a href="/" class="btn">Back to bryndeli.co.uk →</a>
</main>
</body>
</html>
